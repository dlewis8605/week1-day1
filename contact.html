<!DOCTYPE html>
<html>
    <head>
        <title>My Third Web Page</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- Container to wrap everything -->
        <div id="container">
            <!-- Brand of website -->
            <header>My Web Site Brand</header>
            <!-- Main Navigation -->
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav> <!-- End of Main Navigation -->

            <!-- Main Content -->
            <main>
                <h1>My Third Heading</h1>
                <p> My third paragraph. </p>

                <form action="/signup" method="post">
                    <fieldset>
                        <legend>User personal information</legend>
                        <label>Enter your full name</label>
                        <input type="text" name="name">
                        <label>Select your gender</label>
                        <input type="radio" name="gender" value="male">Male<input type="radio" name="gender" value="female">Female<br>
                        <label>How should we contact you?</label>
                        <select id="contactSelect">
                            <option value="none">Select One</option>
                            <option value="email">Email</option>
                            <option value="phone">Phone</option>
                        </select>
                        <div id="emailbox">
                            <label>Enter your email</label>
                            <input type="text" name="email">
                        </div>
                        <div id="phonebox">
                            <label>Enter your phone</label>
                            <input type="text" name="phone">
                        </div>
                        <label>Tell us the reason of your visit today:</label>
                        <textarea rows="5" cols="30"></textarea><br>
                        <input type="submit" value="sign-up">
                    </fieldset>
                </form>
            </main><!-- End of Main Content -->

            <!-- Footer Information -->
            <footer>&copy; Copyright 2020</footer>

        </div> <!-- End Container -->
        <script src="script.js"></script>
    </body>
</html>
